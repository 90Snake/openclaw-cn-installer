name: Build OpenClaw Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows Setup
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build Windows NSIS installer
        run: npm run tauri:build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-cn-installer-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    name: Build macOS App (${{ matrix.runner_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            runner_label: intel
            artifact_name: openclaw-cn-installer-macos-intel
          - runner: macos-latest
            runner_label: apple-silicon
            artifact_name: openclaw-cn-installer-macos-apple-silicon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build macOS app bundle
        run: npm run tauri:build -- --bundles app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/macos/*.app
